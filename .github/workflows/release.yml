name: Create Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, x86, ARM64]

    env:
      Solution_Name: AuraClick.slnx
      Dir_Name: AuraClick

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Restore the application
      run: msbuild $env:Solution_Name /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    - name: Create the app package
      run: msbuild $env:Solution_Name /p:Configuration=$env:Configuration /p:Platform=$env:Platform /p:UapAppxPackageBuildMode=$env:Appx_Package_Build_Mode /p:AppxBundle=$env:Appx_Bundle /p:AppxPackageDir="$env:Appx_Package_Dir" /p:GenerateAppxPackageOnBuild=true
      env:
        Appx_Bundle: Never
        Appx_Package_Build_Mode: SideloadOnly
        Appx_Package_Dir: Packages\
        Configuration: ${{ matrix.configuration }}
        Platform: ${{ matrix.platform }}

    - name: Upload MSIX package
      uses: actions/upload-artifact@v7
      with:
        name: MSIX Package (${{ matrix.configuration }}, ${{ matrix.platform }})
        path: ${{ env.Dir_Name }}\Packages\
        if-no-files-found: error

    - name: sign
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
        project-slug: auraclick
        signing-policy-slug: release-signing
        github-artifact-id: ${{steps.upload-unsigned-artifact.outputs.artifact-id}}
        wait-for-completion: true
        output-artifact-directory: msix-package-signed

    - name: Upload MSIX package
      uses: actions/upload-artifact@v7
      with:
        name: Signed MSIX Package (${{ matrix.configuration }}, ${{ matrix.platform }})
        path: msix-package-signed
        if-no-files-found: error
